<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="utf-8">
<title>Fairprice 系統架構圖</title>
<style>
  body { margin:0; background:#e2e8f0; overflow:hidden; }
  #wrap { width:100vw; height:100vh; cursor:grab; overflow:hidden; position:relative; }
  #wrap:active { cursor:grabbing; }
  #svg-container { position:absolute; top:0; left:0; transform-origin:top left; }
  #hint { position:fixed; bottom:12px; right:16px; font:12px ui-sans-serif,system-ui,sans-serif;
           color:#64748b; background:rgba(255,255,255,.8); padding:4px 10px; border-radius:6px; }
</style>
</head>
<body>
<div id="wrap">
  <div id="svg-container">
    <img id="arch-img" src="fairprice-architecture.svg" style="width:1600px;height:1200px;display:block;">
  </div>
</div>
<div id="hint">scroll: zoom · drag: pan · dblclick: fit</div>
<script>
const W = 1600, H = 1200;
const wrap = document.getElementById('wrap');
const container = document.getElementById('svg-container');
let scale = Math.min(window.innerWidth/W, window.innerHeight/H) * 0.95;
let tx = (window.innerWidth - W*scale)/2;
let ty = (window.innerHeight - H*scale)/2;
function apply() {
  container.style.transform = `translate(${tx}px,${ty}px) scale(${scale})`;
}
apply();
wrap.addEventListener('wheel', e => {
  e.preventDefault();
  const rect = wrap.getBoundingClientRect();
  const mx = e.clientX - rect.left, my = e.clientY - rect.top;
  const delta = e.deltaY < 0 ? 1.1 : 0.91;
  tx = mx - (mx - tx)*delta;
  ty = my - (my - ty)*delta;
  scale *= delta;
  apply();
}, {passive:false});
let drag = null;
wrap.addEventListener('mousedown', e => { drag = {sx:e.clientX-tx, sy:e.clientY-ty}; });
wrap.addEventListener('mousemove', e => { if(drag){ tx=e.clientX-drag.sx; ty=e.clientY-drag.sy; apply(); } });
wrap.addEventListener('mouseup', () => drag=null);
wrap.addEventListener('dblclick', () => {
  scale = Math.min(window.innerWidth/W, window.innerHeight/H)*0.95;
  tx = (window.innerWidth-W*scale)/2; ty = (window.innerHeight-H*scale)/2;
  apply();
});
</script>
</body>
</html>
