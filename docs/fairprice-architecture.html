<div id="hint">scroll: zoom · drag: pan · dblclick: fit</div>
<script>
const wrap = document.getElementById('wrap');
const container = document.getElementById('svg-container');
const svgEl = container.querySelector('svg');
svgEl.style.width = '2200px';
svgEl.style.height = '870px';
let scale = Math.min(window.innerWidth/2200, window.innerHeight/870) * 0.95;
let tx = (window.innerWidth - 2200*scale)/2;
let ty = (window.innerHeight - 870*scale)/2;
function apply() {
  container.style.transform = `translate(${tx}px,${ty}px) scale(${scale})`;
}
apply();
wrap.addEventListener('wheel', e => {
  e.preventDefault();
  const rect = wrap.getBoundingClientRect();
  const mx = e.clientX - rect.left, my = e.clientY - rect.top;
  const delta = e.deltaY < 0 ? 1.1 : 0.91;
  tx = mx - (mx - tx)*delta;
  ty = my - (my - ty)*delta;
  scale *= delta;
  apply();
}, {passive:false});
let drag = null;
wrap.addEventListener('mousedown', e => { drag = {sx:e.clientX-tx, sy:e.clientY-ty}; });
wrap.addEventListener('mousemove', e => { if(drag){ tx=e.clientX-drag.sx; ty=e.clientY-drag.sy; apply(); } });
wrap.addEventListener('mouseup', () => drag=null);
wrap.addEventListener('dblclick', () => {
  scale = Math.min(window.innerWidth/2200, window.innerHeight/870)*0.95;
  tx = (window.innerWidth-2200*scale)/2; ty = (window.innerHeight-870*scale)/2;
  apply();
});
</script>
