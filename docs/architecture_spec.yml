project: fairprice
title: Fairprice 系統架構圖
canvas:
  width: 2200
layers:
- id: browser
  type: box
  text: Browser / User
  fill: '#fef08a'
  stroke: '#854d0e'
- id: frontend
  type: band
  label: Frontend  (React + TypeScript, port 5173)
  fill: '#dbeafe'
  stroke: '#1d4ed8'
  item_fill: '#93c5fd'
  item_stroke: '#1d4ed8'
  items:
  - - OptionsChainTable
    - Tippy+KaTeX tooltip
  - - OwnershipApp
    - 持股結構圖
  - - OptionPriceTrackerApp
    - 期權鏈追蹤
  - - AddPositionForm
    - ''
  - - PositionListTab
    - ''
  - - CalculatorTab
    - 融資試算器
  - - InterestScheduleTable
    - ''
- id: rails_api
  type: band
  label: Rails API  (port 3003)
  fill: '#dcfce7'
  stroke: '#15803d'
  item_fill: '#86efac'
  item_stroke: '#15803d'
  items:
  - - ValuationsController
    - FairPrice
  - - ReportsController
    - Daily Momentum
  - - OwnershipController
    - 持股結構
  - - OptionPriceTrackerController
    - 期權鏈
  - - MarginPositionsController
    - 融資部位
  - - Api::V1::*
    - JSON API
- id: services
  type: band
  label: Services
  fill: '#fef9c3'
  stroke: '#a16207'
  item_fill: '#fde047'
  item_stroke: '#a16207'
  items:
  - - FinnhubService
    - 報價/指標
  - - YahooFinanceService
    - 持股/歷史/VIX
  - - VixService
    - VIX 指數
  - - MomentumReportService
    - 動能報告
  - - StockDataService
    - 估值資料
  - - ValuationService
    - DCF/PE/PEG
  - - SecEdgarService
    - 機構持股備援
  - - IvRankService
    - IV Rank
  - - OuouAnalysisService
    - AI 分析
- id: models
  type: band
  label: Models / Database  (PostgreSQL)
  fill: '#fce7f3'
  stroke: '#9d174d'
  item_fill: '#f9a8d4'
  item_stroke: '#9d174d'
  items:
  - - OptionSnapshot
    - 期權快照
  - - TrackedTicker
    - 追蹤代號
  - - OwnershipSnapshot
    - 持股快照
  - - OwnershipHolder
    - 持股人
  - - MarginPosition
    - 融資部位
- id: scripts
  type: band
  label: 自動化腳本  (Python + Playwright CDP)
  fill: '#fef9c3'
  stroke: '#a16207'
  item_fill: '#fde047'
  item_stroke: '#a16207'
  items:
  - - options_collector.py
    - CBOE→yfinance
  - - fairprice.py
    - Playwright 截圖
  - - options_ocr.py
    - OCR 解析
- id: external_apis
  type: external
  label: 外部 API / 資料來源
  items:
  - text: CBOE Delayed Quotes
    sub: 期權鏈（主要）
    fill: '#fde68a'
    stroke: '#d97706'
  - text: Yahoo Finance
    sub: 報價/歷史/VIX/持股
    fill: '#bfdbfe'
    stroke: '#2563eb'
  - text: Finnhub
    sub: 報價/指標/財報
    fill: '#bbf7d0'
    stroke: '#16a34a'
  - text: SEC EDGAR
    sub: 機構持股（備援）
    fill: '#e9d5ff'
    stroke: '#7c3aed'
arrows:
- - browser
  - frontend
- - frontend
  - rails_api
- - rails_api
  - services
- - services
  - models
- - models
  - scripts
- - scripts
  - external_apis
- - services
  - external_apis
