default: &default
  adapter: postgresql
  encoding: unicode
  pool: <%= ENV.fetch("RAILS_MAX_THREADS") { 5 } %>
  host:     <%= ENV.fetch("DB_HOST",     "localhost") %>
  port:     <%= ENV.fetch("DB_PORT",     5432) %>
  username: <%= ENV.fetch("DB_USER",     "idarfan") %>
  password: <%= ENV.fetch("DB_PASSWORD", "") %>

development:
  <<: *default
  database: fairprice_development

test:
  <<: *default
  database: fairprice_test

production:
  <<: *default
  database: fairprice_production
